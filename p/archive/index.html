<style>
  :root {
    --bg: #FFFFFF;
    --text: #1B2027;
    --text-muted: #4E5A66;
    --text-faint: #6E7A86;
    --rule: #E3E7EB;
    --accent: #1A5FC8;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #14171B;
      --text: #E7EAEE;
      --text-muted: #A9B3BD;
      --text-faint: #7E8994;
      --rule: #2A3037;
      --accent: #82B1F0;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font-family: "Pretendard", -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo",
      "Noto Sans KR", "Malgun Gothic", system-ui, sans-serif;
    font-size: 16px; line-height: 1.6; -webkit-font-smoothing: antialiased;
  }
  main { max-width: 1080px; margin: 0 auto; padding: 40px 24px 80px; }
  a { color: var(--accent); text-decoration: underline; text-underline-offset: 3px; }
  h1 { margin: 0 0 6px; font-size: 1.5rem; font-weight: 700; letter-spacing: -0.01em; }
  .lede { margin: 0; color: var(--text-muted); font-size: 0.9375rem; }

  /* 월 바로가기: 제목 아래 한 줄(넘치면 줄바꿈). */
  #months { display: flex; flex-wrap: wrap; gap: 4px 16px; margin: 24px 0 0; }
  #months a {
    font-family: ui-monospace, "SF Mono", monospace; font-size: 0.75rem;
    color: var(--text-faint); text-decoration: none;
    font-variant-numeric: tabular-nums;
  }
  #months a:hover, #months a:focus-visible {
    color: var(--accent); text-decoration: underline; text-underline-offset: 3px;
  }

  /* 월 헤딩은 sticky. border-bottom 이 아래 격자의 상단 괘선을 겸한다. */
  h2.month {
    position: sticky; top: 0; z-index: 1;
    margin: 40px 0 0; padding: 10px 0 8px;
    background: var(--bg);
    font-family: ui-monospace, "SF Mono", monospace;
    font-size: 0.8125rem; font-weight: 600; color: var(--text-faint);
    border-bottom: 1px solid var(--rule);
  }
  .month-n { margin-left: 8px; font-weight: 400; }

  /* 여백 있는 카드 격자. 칼럼 수는 폭에 따라 자동. */
  .grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(235px, 1fr));
    gap: 16px; margin-top: 16px;
  }
  a.cell {
    display: flex; flex-direction: column; min-width: 0;
    background: var(--bg); border: 1px solid var(--rule); border-radius: 10px;
    overflow: hidden;
    text-decoration: none; color: inherit;
  }
  a.cell:hover .cell-title { color: var(--accent); text-decoration: underline; text-underline-offset: 3px; }
  a.cell:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  /* 커버 타일: 실제 썸네일이 없으므로 주제별 색조(--h) + 아이콘으로 대신한다.
     색조는 사이트 정체성(차가운 톤)에 맞춰 파랑-청록 대역에서만 고른다. */
  .cover {
    height: 84px; flex: none; position: relative;
    display: flex; align-items: center; justify-content: center;
    background: hsl(var(--h) 42% 95.5%); color: hsl(var(--h) 40% 46%);
  }
  .cover svg { width: 26px; height: 26px; }
  .cover img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
  a.cell:hover .cover { background: hsl(var(--h) 45% 92.5%); }
  @media (prefers-color-scheme: dark) {
    .cover { background: hsl(var(--h) 22% 16.5%); color: hsl(var(--h) 42% 72%); }
    a.cell:hover .cover { background: hsl(var(--h) 26% 20%); }
  }

  .cell-body { display: flex; flex-direction: column; gap: 5px; padding: 12px 14px 14px; flex: 1; }
  .cell-date {
    font-family: ui-monospace, "SF Mono", monospace; font-size: 0.75rem;
    color: var(--text-faint); font-variant-numeric: tabular-nums;
  }
  .cell-title { margin: 0; font-size: 0.9375rem; font-weight: 600; line-height: 1.45; flex: 1; }
  .cell-tag { font-size: 0.75rem; color: var(--text-faint); }

  .status { margin: 40px 0; color: var(--text-muted); font-size: 0.9375rem; }

  footer {
    margin-top: 64px; padding-top: 16px; border-top: 1px solid var(--rule);
    font-size: 0.8125rem; color: var(--text-faint);
  }
</style>

<body>
<main>
  <p class="home-top" style="margin:0 0 28px;font-size:0.8125rem"><a href="../../">← today i learned</a></p>

  <h1>전체 목록</h1>
  <p class="lede">발행된 페이지 <span id="total">전체</span>건을 월별로 모아 둔 색인입니다.</p>

  <nav id="months" aria-label="월 바로가기"></nav>

  <div id="groups"><p class="status">목록을 불러오는 중…</p></div>
  <noscript><p class="status">이 페이지는 루트 갤러리에서 목록을 불러옵니다. 자바스크립트를 켜거나 <a href="../../">홈</a>에서 봐 주세요.</p></noscript>

  <footer><p><a href="../../">← today i learned</a></p></footer>
</main>

<script>
  // 목록의 진실원본은 루트 index.html 의 갤러리 카드다. 이 페이지는 그것을
  // fetch 해 월별 격자로 다시 그린다 — 퍼블리시 때 여기를 따로 갱신할 필요가 없다.
  (function () {
    var groupsEl = document.getElementById("groups");
    var monthsNav = document.getElementById("months");
    var totalEl = document.getElementById("total");

    // 주제별 커버 색조(hue)·아이콘. 새 주제 키는 해시로 HUE_POOL 에서 색을 받고
    // 아이콘은 기본(문서)으로 폴백하므로, 주제가 늘어도 여기를 안 고쳐도 된다.
    var HUES = { hardware: 215, ai: 252, workflow: 192, games: 262, system: 172, terminal: 205, economy: 232, site: 185 };
    var HUE_POOL = [215, 252, 192, 262, 172, 205, 232, 185];
    function hueFor(key) {
      if (HUES[key] !== undefined) return HUES[key];
      var hash = 0;
      for (var i = 0; i < key.length; i++) hash = (hash * 31 + key.charCodeAt(i)) % 997;
      return HUE_POOL[hash % HUE_POOL.length];
    }
    var ICON_DEFAULT = '<path d="M7 3h7l4 4v14H7z"/><path d="M14 3v4h4"/><path d="M10 12h5M10 15.5h5"/>';
    var ICONS = {
      hardware: '<rect x="7" y="7" width="10" height="10" rx="1.5"/><path d="M9 7V4M12 7V4M15 7V4M9 20v-3M12 20v-3M15 20v-3M7 9H4M7 12H4M7 15H4M20 9h-3M20 12h-3M20 15h-3"/>',
      ai: '<path d="M12 3l2.1 5.4 5.4 2.1-5.4 2.1L12 18l-2.1-5.4-5.4-2.1 5.4-2.1L12 3z"/><path d="M18.5 16.5v4M16.5 18.5h4"/>',
      workflow: '<circle cx="6" cy="6" r="2.2"/><circle cx="18" cy="6" r="2.2"/><circle cx="12" cy="18" r="2.2"/><path d="M8.2 6h7.6M7 8l3.8 8M17 8l-3.8 8"/>',
      games: '<rect x="3" y="8" width="18" height="9" rx="4.5"/><path d="M8 10.8v3.4M6.3 12.5h3.4"/><circle cx="16.2" cy="11.6" r="1" fill="currentColor" stroke="none"/><circle cx="18" cy="13.4" r="1" fill="currentColor" stroke="none"/>',
      system: '<circle cx="12" cy="12" r="3"/><path d="M12 3v2.5M12 18.5V21M3 12h2.5M18.5 12H21M5.8 5.8l1.7 1.7M16.5 16.5l1.7 1.7M18.2 5.8l-1.7 1.7M7.5 16.5l-1.7 1.7"/>',
      terminal: '<rect x="3" y="5" width="18" height="14" rx="2"/><path d="M7 9l3 3-3 3M12.5 15H17"/>',
      economy: '<path d="M4 4v16h16"/><path d="M7.5 14.5l3.3-4 3 2.5 4.2-5.5"/>',
      site: '<path d="M7 4.5h10V20l-5-3.4L7 20V4.5z"/>'
    };
    // THUMBS:START
    var THUMBS = {"2026-07-agent-workflow":1,"agents-a1-4b":1,"backlog-md-vs-plan-md":1,"citrini-2028-gic":1,"herdr-pane-tradeoffs":1,"herdr-vs-orca":1,"jacobian-conjecture-counterexample":1,"kb16-bootloop-usb-power":1,"kb16-firmware-diy":1,"kb16-qmk-layer-stack":1,"key-repeat-case-closed":1,"key-repeat-explosion":1,"keyboard-fixed-mic-dead":1,"kil9conf-14-years":1,"lingbot-map-local":1,"liv-today":1,"moshi-voice-ai":1,"nintendo-actions-runner":1,"notosanskr-nfc-fixed":1,"pace-not-percent":1,"post-labor-capitalism":1,"push-to-talk-edge-cases":1,"rift-vs-git-worktree":1,"upcoming-games-2026h2":1,"voice-prompting-cost":1,"wsl2-localhost-death":1};
    // THUMBS:END
    // 실제 썸네일 매니페스트. backlog/assets/archive-thumbs.py 가 각 페이지의
    // 임베드 삽화를 추출해 thumbs/<slug>.webp 를 만들고 위 THUMBS 한 줄을
    // 갱신한다. 매니페스트에 없는 글은 주제 타일 폴백(신규 페이지는 스크립트
    // 재실행 전까지 타일로 보인다).

    function coverFor(card, href) {
      var cover = document.createElement("div");
      cover.className = "cover";
      // 바탕에는 항상 주제 타일을 깔고, 썸네일이 있으면 위에 덮는다(로딩 중·실패 시 타일 노출).
      var key = card.dataset.topic || "";
      cover.style.setProperty("--h", hueFor(key));
      cover.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">' + (ICONS[key] || ICON_DEFAULT) + "</svg>";
      var slug = href.replace(/\/+$/, "").split("/").pop();
      var src = card.dataset.thumb || (THUMBS[slug] ? "thumbs/" + slug + ".webp" : null);
      if (src) {
        var img = document.createElement("img");
        img.alt = "";
        img.loading = "lazy";
        img.decoding = "async";
        img.onerror = function () { if (img.parentNode) cover.removeChild(img); };
        img.src = src;
        cover.appendChild(img);
      }
      return cover;
    }

    function fail() {
      groupsEl.innerHTML = "";
      var p = document.createElement("p");
      p.className = "status";
      p.textContent = "목록을 불러오지 못했습니다. ";
      var a = document.createElement("a");
      a.href = "../../";
      a.textContent = "홈으로 →";
      p.appendChild(a);
      groupsEl.appendChild(p);
    }

    fetch("../../index.html")
      .then(function (res) {
        if (!res.ok) throw new Error("HTTP " + res.status);
        return res.text();
      })
      .then(function (html) {
        var doc = new DOMParser().parseFromString(html, "text/html");
        var cards = Array.prototype.slice
          .call(doc.querySelectorAll("a.card[data-date]"))
          .map(function (card, i) { return { card: card, date: card.dataset.date, i: i }; })
          .sort(function (a, b) {
            if (a.date !== b.date) return a.date < b.date ? 1 : -1;
            return a.i - b.i;
          })
          .map(function (entry) { return entry.card; });
        if (!cards.length) { fail(); return; }

        totalEl.textContent = cards.length;

        var byMonth = {};
        cards.forEach(function (card) {
          var month = card.dataset.date.slice(0, 7);
          (byMonth[month] = byMonth[month] || []).push(card);
        });

        groupsEl.innerHTML = "";
        Object.keys(byMonth).sort().reverse().forEach(function (month) {
          var items = byMonth[month];

          var navLink = document.createElement("a");
          navLink.href = "#m-" + month;
          navLink.textContent = month + " (" + items.length + ")";
          monthsNav.appendChild(navLink);

          var heading = document.createElement("h2");
          heading.className = "month";
          heading.id = "m-" + month;
          heading.textContent = month;
          var n = document.createElement("span");
          n.className = "month-n";
          n.textContent = items.length + "건";
          heading.appendChild(n);
          groupsEl.appendChild(heading);

          var grid = document.createElement("div");
          grid.className = "grid";
          items.forEach(function (card) {
            var cell = document.createElement("a");
            cell.className = "cell";
            // 루트 기준 상대경로("./2026/…")를 이 페이지 뎁스(p/archive/) 기준으로 보정.
            cell.href = card.getAttribute("href").replace(/^\.\//, "../../");
            cell.appendChild(coverFor(card, cell.getAttribute("href")));
            var body = document.createElement("div");
            body.className = "cell-body";
            var date = document.createElement("span");
            date.className = "cell-date";
            date.textContent = card.dataset.date.slice(5, 10);
            var title = document.createElement("h3");
            title.className = "cell-title";
            var h = card.querySelector("h2");
            title.textContent = h ? h.textContent : cell.getAttribute("href");
            body.appendChild(date);
            body.appendChild(title);
            var t = card.querySelector(".tag");
            if (t) {
              var tag = document.createElement("span");
              tag.className = "cell-tag";
              tag.textContent = t.textContent;
              body.appendChild(tag);
            }
            cell.appendChild(body);
            grid.appendChild(cell);
          });
          groupsEl.appendChild(grid);
        });

        // 앵커 진입(#m-YYYY-MM)은 렌더 뒤에야 대상이 생기므로 직접 스크롤한다.
        if (location.hash) {
          var target = document.getElementById(location.hash.slice(1));
          if (target) target.scrollIntoView();
        }
      })
      .catch(fail);
  })();
