<style>
  :root {
    --bg: #FFFFFF;
    --text: #1B2027;
    --text-muted: #4E5A66;
    --text-faint: #6E7A86;
    --rule: #E3E7EB;
    --accent: #1A5FC8;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #14171B;
      --text: #E7EAEE;
      --text-muted: #A9B3BD;
      --text-faint: #7E8994;
      --rule: #2A3037;
      --accent: #82B1F0;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font-family: "Pretendard", -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo",
      "Noto Sans KR", "Malgun Gothic", system-ui, sans-serif;
    font-size: 16px; line-height: 1.6; -webkit-font-smoothing: antialiased;
  }
  main { max-width: 1080px; margin: 0 auto; padding: 40px 24px 80px; }
  a { color: var(--accent); text-decoration: underline; text-underline-offset: 3px; }
  h1 { margin: 0 0 6px; font-size: 1.5rem; font-weight: 700; letter-spacing: -0.01em; }
  .lede { margin: 0; color: var(--text-muted); font-size: 0.9375rem; }

  /* 월 바로가기: 제목 아래 한 줄(넘치면 줄바꿈). */
  #months { display: flex; flex-wrap: wrap; gap: 4px 16px; margin: 24px 0 0; }
  #months a {
    font-family: ui-monospace, "SF Mono", monospace; font-size: 0.75rem;
    color: var(--text-faint); text-decoration: none;
    font-variant-numeric: tabular-nums;
  }
  #months a:hover, #months a:focus-visible {
    color: var(--accent); text-decoration: underline; text-underline-offset: 3px;
  }

  /* 월 헤딩은 sticky. border-bottom 이 아래 격자의 상단 괘선을 겸한다. */
  h2.month {
    position: sticky; top: 0; z-index: 1;
    margin: 40px 0 0; padding: 10px 0 8px;
    background: var(--bg);
    font-family: ui-monospace, "SF Mono", monospace;
    font-size: 0.8125rem; font-weight: 600; color: var(--text-faint);
    border-bottom: 1px solid var(--rule);
  }
  .month-n { margin-left: 8px; font-weight: 400; }

  /* 1px 간격 + 괘선 배경으로 hairline 격자를 만든다. 칼럼 수는 폭에 따라 자동. */
  .grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 1px; background: var(--rule);
    border: 1px solid var(--rule); border-top: 0;
  }
  a.cell {
    display: flex; flex-direction: column; gap: 6px; min-width: 0;
    background: var(--bg); padding: 14px 16px 16px;
    text-decoration: none; color: inherit;
  }
  a.cell:hover .cell-title { color: var(--accent); text-decoration: underline; text-underline-offset: 3px; }
  a.cell:focus-visible { outline: 2px solid var(--accent); outline-offset: -2px; }
  .cell-date {
    font-family: ui-monospace, "SF Mono", monospace; font-size: 0.75rem;
    color: var(--text-faint); font-variant-numeric: tabular-nums;
  }
  .cell-title { margin: 0; font-size: 0.9375rem; font-weight: 600; line-height: 1.45; flex: 1; }
  .cell-tag { font-size: 0.75rem; color: var(--text-faint); }

  .status { margin: 40px 0; color: var(--text-muted); font-size: 0.9375rem; }

  footer {
    margin-top: 64px; padding-top: 16px; border-top: 1px solid var(--rule);
    font-size: 0.8125rem; color: var(--text-faint);
  }
</style>
</head>
<body>
<main>
  <p class="home-top" style="margin:0 0 28px;font-size:0.8125rem"><a href="../../">← today i learned</a></p>

  <h1>전체 목록</h1>
  <p class="lede">발행된 페이지 <span id="total">전체</span>건을 월별로 모아 둔 색인입니다.</p>

  <nav id="months" aria-label="월 바로가기"></nav>

  <div id="groups"><p class="status">목록을 불러오는 중…</p></div>
  <noscript><p class="status">이 페이지는 루트 갤러리에서 목록을 불러옵니다. 자바스크립트를 켜거나 <a href="../../">홈</a>에서 봐 주세요.</p></noscript>

  <footer><p><a href="../../">← today i learned</a></p></footer>
</main>

<script>
  // 목록의 진실원본은 루트 index.html 의 갤러리 카드다. 이 페이지는 그것을
  // fetch 해 월별 격자로 다시 그린다 — 퍼블리시 때 여기를 따로 갱신할 필요가 없다.
  (function () {
    var groupsEl = document.getElementById("groups");
    var monthsNav = document.getElementById("months");
    var totalEl = document.getElementById("total");

    function fail() {
      groupsEl.innerHTML = "";
      var p = document.createElement("p");
      p.className = "status";
      p.textContent = "목록을 불러오지 못했습니다. ";
      var a = document.createElement("a");
      a.href = "../../";
      a.textContent = "홈으로 →";
      p.appendChild(a);
      groupsEl.appendChild(p);
    }

    fetch("../../index.html")
      .then(function (res) {
        if (!res.ok) throw new Error("HTTP " + res.status);
        return res.text();
      })
      .then(function (html) {
        var doc = new DOMParser().parseFromString(html, "text/html");
        var cards = Array.prototype.slice
          .call(doc.querySelectorAll("a.card[data-date]"))
          .map(function (card, i) { return { card: card, date: card.dataset.date, i: i }; })
          .sort(function (a, b) {
            if (a.date !== b.date) return a.date < b.date ? 1 : -1;
            return a.i - b.i;
          })
          .map(function (entry) { return entry.card; });
        if (!cards.length) { fail(); return; }

        totalEl.textContent = cards.length;

        var byMonth = {};
        cards.forEach(function (card) {
          var month = card.dataset.date.slice(0, 7);
          (byMonth[month] = byMonth[month] || []).push(card);
        });

        groupsEl.innerHTML = "";
        Object.keys(byMonth).sort().reverse().forEach(function (month) {
          var items = byMonth[month];

          var navLink = document.createElement("a");
          navLink.href = "#m-" + month;
          navLink.textContent = month + " (" + items.length + ")";
          monthsNav.appendChild(navLink);

          var heading = document.createElement("h2");
          heading.className = "month";
          heading.id = "m-" + month;
          heading.textContent = month;
          var n = document.createElement("span");
          n.className = "month-n";
          n.textContent = items.length + "건";
          heading.appendChild(n);
          groupsEl.appendChild(heading);

          var grid = document.createElement("div");
          grid.className = "grid";
          items.forEach(function (card) {
            var cell = document.createElement("a");
            cell.className = "cell";
            // 루트 기준 상대경로("./2026/…")를 이 페이지 뎁스(p/archive/) 기준으로 보정.
            cell.href = card.getAttribute("href").replace(/^\.\//, "../../");
            var date = document.createElement("span");
            date.className = "cell-date";
            date.textContent = card.dataset.date.slice(5, 10);
            var title = document.createElement("h3");
            title.className = "cell-title";
            var h = card.querySelector("h2");
            title.textContent = h ? h.textContent : cell.getAttribute("href");
            cell.appendChild(date);
            cell.appendChild(title);
            var t = card.querySelector(".tag");
            if (t) {
              var tag = document.createElement("span");
              tag.className = "cell-tag";
              tag.textContent = t.textContent;
              cell.appendChild(tag);
            }
            grid.appendChild(cell);
          });
          groupsEl.appendChild(grid);
        });

        // 앵커 진입(#m-YYYY-MM)은 렌더 뒤에야 대상이 생기므로 직접 스크롤한다.
        if (location.hash) {
          var target = document.getElementById(location.hash.slice(1));
          if (target) target.scrollIntoView();
        }
      })
      .catch(fail);
  })();
</script>
