<style>
  :root {
    --bg: #FFFFFF;
    --text: #1B2027;
    --text-muted: #4E5A66;
    --text-faint: #6E7A86;
    --rule: #E3E7EB;
    --accent: #1A5FC8;
    --ok: #0E8A16;
    --err: #C2331F;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #14171B;
      --text: #E7EAEE;
      --text-muted: #A9B3BD;
      --text-faint: #7E8994;
      --rule: #2A3037;
      --accent: #82B1F0;
      --ok: #5FBF6A;
      --err: #E8705C;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font-family: "Pretendard", -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo",
      "Noto Sans KR", "Malgun Gothic", system-ui, sans-serif;
    font-size: 16px; line-height: 1.6; -webkit-font-smoothing: antialiased;
  }
  main { max-width: 560px; margin: 0 auto; padding: 48px 24px 80px; }
  h1 { margin: 0 0 8px; font-size: 1.5rem; font-weight: 700; letter-spacing: -0.01em; }
  p { margin: 0 0 12px; }
  a { color: var(--accent); text-decoration: underline; text-underline-offset: 3px; }
  footer {
    margin-top: 64px; padding-top: 16px; border-top: 1px solid var(--rule);
    font-size: 0.8125rem; color: var(--text-faint);
  }

  .liv { display: grid; grid-template-columns: auto 1fr; gap: 12px; align-items: start; margin: 24px 0 32px; }
  .liv img { grid-column: 1; grid-row: 1; width: 44px; height: 44px; margin-top: 2px; border-radius: 50%; background: #FFFFFF; }
  .liv p { grid-column: 2; margin: 0; color: var(--text-muted); }

  form { display: grid; gap: 14px; }
  label { display: block; font-size: 0.8125rem; font-weight: 600; color: var(--text-muted); margin-bottom: 6px; }
  input[type="url"], input[type="password"], textarea {
    width: 100%; padding: 10px 12px; border: 1px solid var(--rule); border-radius: 8px;
    background: var(--bg); color: var(--text); font: inherit; font-size: 0.9375rem;
  }
  input:focus-visible, textarea:focus-visible { outline: 2px solid var(--accent); outline-offset: 1px; border-color: transparent; }
  textarea { min-height: 84px; resize: vertical; }
  button {
    justify-self: start; padding: 9px 22px; border: 0; border-radius: 8px;
    background: var(--accent); color: #FFFFFF; font: inherit; font-size: 0.9375rem; font-weight: 600;
    cursor: pointer;
  }
  @media (prefers-color-scheme: dark) { button { color: #14171B; } }
  button:disabled { opacity: 0.5; cursor: default; }
  button:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; }
  button.ghost { background: transparent; color: var(--accent); padding: 9px 0; font-weight: 500; text-decoration: underline; text-underline-offset: 3px; }

  .panel { border: 1px solid var(--rule); border-radius: 10px; padding: 20px; margin: 0 0 24px; }
  .panel h2 { margin: 0 0 8px; font-size: 1rem; font-weight: 600; }
  .panel .hint { font-size: 0.8125rem; color: var(--text-faint); }
  .status { margin: 16px 0 0; font-size: 0.9375rem; min-height: 1.6em; }
  .status.ok { color: var(--ok); }
  .status.err { color: var(--err); }
  .keyline { margin: 28px 0 0; font-size: 0.8125rem; color: var(--text-faint); }
  .hidden { display: none; }
</style>
</head>
<body>

    <p>사용자님 전용 창구입니다. 조사할 것을 적어 두고 가시면 순서대로 확인해서 아카이브에 올려 두겠습니다. 진행 상황은 Slack 으로 알려 드립니다.</p>
  </div>

  <section id="pat-panel" class="panel hidden" aria-label="접수함 토큰 등록">
    <h2>접수함 토큰 등록</h2>
    <p class="hint">처음 오셨거나 토큰이 만료된 경우입니다. <code>til-inbox</code> 저장소 한정, Issues Read/Write 권한의 fine-grained PAT 를 한 번만 등록해 주세요. 토큰은 이 브라우저에만 저장됩니다.</p>
    <form id="pat-form">
      <div>
        <label for="pat">Personal Access Token</label>
        <input type="password" id="pat" autocomplete="off" required>
      </div>
      <button type="submit" id="pat-save">등록</button>
    </form>
    <p class="status" id="pat-status" role="status"></p>
  </section>

  <section id="submit-panel" class="hidden" aria-label="URL 제출">
    <form id="submit-form">
      <div>
        <label for="request">요청</label>
        <textarea id="request" placeholder="조사할 주제나 URL 을 적어 주세요. 원하는 관점이나 배경을 곁들여도 좋습니다." required></textarea>
      </div>
      <button type="submit" id="submit-btn">접수</button>
    </form>
    <p class="status" id="submit-status" role="status" aria-live="polite"></p>
    <p class="keyline"><button type="button" class="ghost" id="pat-reset">토큰 재설정</button></p>
  </section>

  <footer><p><a href="../">← today i learned</a></p></footer>
</main>
<script>
(function () {
  var KEY = 'til-inbox-pat';
  var API = 'https://api.github.com/repos/kil9/til-inbox';
  var patPanel = document.getElementById('pat-panel');
  var submitPanel = document.getElementById('submit-panel');
  var patStatus = document.getElementById('pat-status');
  var submitStatus = document.getElementById('submit-status');

  function show(el) { el.classList.remove('hidden'); }
  function hide(el) { el.classList.add('hidden'); }
  function setStatus(el, msg, cls) { el.textContent = msg; el.className = 'status' + (cls ? ' ' + cls : ''); }

  function headers(pat) {
    return {
      'Authorization': 'Bearer ' + pat,
      'Accept': 'application/vnd.github+json',
      'X-GitHub-Api-Version': '2022-11-28',
      'Content-Type': 'application/json'
    };
  }

  function refresh() {
    if (localStorage.getItem(KEY)) { hide(patPanel); show(submitPanel); }
    else { show(patPanel); hide(submitPanel); }
  }

  document.getElementById('pat-form').addEventListener('submit', function (e) {
    e.preventDefault();
    var pat = document.getElementById('pat').value.trim();
    if (!pat) return;
    var btn = document.getElementById('pat-save');
    btn.disabled = true;
    setStatus(patStatus, '토큰을 확인하는 중입니다…');
    fetch(API, { headers: headers(pat) }).then(function (res) {
      if (res.ok) {
        localStorage.setItem(KEY, pat);
        document.getElementById('pat').value = '';
        setStatus(patStatus, '');
        refresh();
        setStatus(submitStatus, '토큰을 등록했습니다. 이제 접수만 하시면 됩니다.', 'ok');
      } else {
        setStatus(patStatus, '토큰이 거부당했습니다 (HTTP ' + res.status + '). 저장소 지정과 Issues 권한을 확인해 주세요.', 'err');
      }
    }).catch(function () {
      setStatus(patStatus, '네트워크 오류로 확인하지 못했습니다. 잠시 후 다시 시도해 주세요.', 'err');
    }).finally(function () { btn.disabled = false; });
  });

  document.getElementById('pat-reset').addEventListener('click', function () {
    localStorage.removeItem(KEY);
    setStatus(submitStatus, '');
    refresh();
  });

  document.getElementById('submit-form').addEventListener('submit', function (e) {
    e.preventDefault();
    var request = document.getElementById('request').value.trim();
    if (!request) return;
    var pat = localStorage.getItem(KEY);
    if (!pat) { refresh(); return; }
    var btn = document.getElementById('submit-btn');
    btn.disabled = true;
    setStatus(submitStatus, '접수하는 중입니다…');
    var firstLine = request.split('\n')[0].trim();
    var title = '[submit] ' + (firstLine.length > 60 ? firstLine.slice(0, 60) + '…' : firstLine);
    var body = 'SOURCE: admin-page\nREQUEST:\n' + request;
    fetch(API + '/issues', {
      method: 'POST',
      headers: headers(pat),
      body: JSON.stringify({ title: title, body: body, labels: ['pending'] })
    }).then(function (res) {
      if (res.status === 201) {
        return res.json().then(function (data) {
          document.getElementById('submit-form').reset();
          setStatus(submitStatus, '접수했습니다 (#' + data.number + '). 처리되는 대로 Slack 으로 알려 드리겠습니다.', 'ok');
        });
      }
      if (res.status === 401 || res.status === 403) {
        setStatus(submitStatus, '토큰이 거부당했습니다 (HTTP ' + res.status + '). 만료됐을 수 있으니 아래에서 재설정해 주세요.', 'err');
        return;
      }
      setStatus(submitStatus, '접수에 실패했습니다 (HTTP ' + res.status + '). 잠시 후 다시 시도해 주세요.', 'err');
    }).catch(function () {
      setStatus(submitStatus, '네트워크 오류로 접수하지 못했습니다. 잠시 후 다시 시도해 주세요.', 'err');
    }).finally(function () { btn.disabled = false; });
  });

  refresh();
})();
</script>
</body>
